name: Deploy Frontend to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'client/**' # Only trigger when client code changes

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: client/package-lock.json

    - name: Install dependencies
      run: |
        cd client
        npm ci

    - name: Build project
      run: |
        cd client
        npm run build

    - name: FTP Deploy to Hostinger
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: client/dist/
        server-dir: public_html/ # Overwrites the files inside public_html directory on Hostinger
        dangerous-clean-slate: false # Set to true if you want to delete files in public_html that are not in local client/dist
